{% extends 'base.html' %}
{% block title %}{{ action }} Task – TaskFlow{% endblock %}

{% block content %}
<div style="max-width:600px; margin:0 auto;">
  <a href="{{ url_for('project_detail', project_id=project.id) }}" style="color:var(--muted); font-size:.82rem; text-decoration:none; display:inline-flex; align-items:center; gap:4px; margin-bottom:24px;">
    <i class="bi bi-arrow-left"></i> {{ project.name }}
  </a>
  <div class="page-title" style="margin-bottom:24px;">{{ action }} <span>Task</span></div>

  <div class="card">
    <div class="card-body">
      <form method="POST">
        <div class="form-group">
          <label class="form-label">Title *</label>
          <input type="text" name="title" class="form-control"
                 value="{{ task.title if task else '' }}" required placeholder="e.g. Design landing page"/>
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea name="description" class="form-control" rows="3"
                    placeholder="Task details…">{{ task.description if task else '' }}</textarea>
        </div>
        <div class="grid-2">
          <div class="form-group">
            <label class="form-label">Assign To</label>
            <select name="assigned_to" class="form-control">
              <option value="">Unassigned</option>
              {% for member in members %}
              <option value="{{ member.id }}" {{ 'selected' if task and task.assigned_to == member.id else '' }}>
                {{ member.name }}
              </option>
              {% endfor %}
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Due Date</label>
            <input type="date" name="due_date" class="form-control"
                   value="{{ task.due_date.strftime('%Y-%m-%d') if task and task.due_date else '' }}"/>
          </div>
        </div>
        <div class="grid-2">
          <div class="form-group">
            <label class="form-label">Priority</label>
            <select name="priority" class="form-control">
              {% for p in ['low','medium','high'] %}
              <option value="{{ p }}" {{ 'selected' if task and task.priority == p else ('selected' if not task and p == 'medium' else '') }}>
                {{ p.capitalize() }}
              </option>
              {% endfor %}
            </select>
          </div>
          {% if action == 'Edit' %}
          <div class="form-group">
            <label class="form-label">Status</label>
            <select name="status" class="form-control">
              {% for s, sl in [('todo','To Do'),('in_progress','In Progress'),('done','Done')] %}
              <option value="{{ s }}" {{ 'selected' if task and task.status == s else '' }}>{{ sl }}</option>
              {% endfor %}
            </select>
          </div>
          {% endif %}
        </div>
        <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:8px;">
          <a href="{{ url_for('project_detail', project_id=project.id) }}" class="btn btn-outline">Cancel</a>
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-check-lg"></i> {{ action }} Task
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
