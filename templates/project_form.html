{% extends 'base.html' %}
{% block title %}{{ action }} Project – TaskFlow{% endblock %}

{% block content %}
<div style="max-width:560px; margin:0 auto;">
  <a href="{{ url_for('dashboard') }}" style="color:var(--muted); font-size:.82rem; text-decoration:none; display:inline-flex; align-items:center; gap:4px; margin-bottom:24px;">
    <i class="bi bi-arrow-left"></i> Back
  </a>
  <div class="page-title" style="margin-bottom:24px;">{{ action }} <span>Project</span></div>

  <div class="card">
    <div class="card-body">
      <form method="POST">
        <div class="form-group">
          <label class="form-label">Project Name *</label>
          <input type="text" name="name" class="form-control"
                 value="{{ project.name if project else '' }}" required placeholder="e.g. Website Redesign"/>
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea name="description" class="form-control" rows="4"
                    placeholder="What is this project about?">{{ project.description if project else '' }}</textarea>
        </div>
        <div style="display:flex; gap:10px; justify-content:flex-end;">
          <a href="{{ url_for('dashboard') }}" class="btn btn-outline">Cancel</a>
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-check-lg"></i> {{ action }} Project
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
